<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAP OData Tool</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #F2F2F7;
            --surface: #FFFFFF;
            --s2: #F9F9FB;
            --border: #E0E0E8;
            --accent: #0A84FF;
            --adim: #E8F2FF;
            --adark: #006FD6;
            --t1: #1C1C1E;
            --t2: #6E6E73;
            --t3: #AEAEB2;
            --green: #30D158;
            --red: #FF453A;
            --yellow: #FF9F0A;
            --r: 12px;
            --rs: 8px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--t1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            background: rgba(255, 255, 255, .92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            height: 56px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 15px;
        }

        .logo-icon {
            width: 26px;
            height: 26px;
            background: var(--accent);
            border-radius: 6px;
            display: grid;
            place-items: center;
        }

        .logo-icon svg {
            width: 13px;
            height: 13px;
            fill: none;
            stroke: white;
            stroke-width: 2.5;
        }

        .conn-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--t2);
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--t3);
            transition: all .3s;
        }

        .dot.ok {
            background: var(--green);
            box-shadow: 0 0 0 3px rgba(48, 209, 88, .2);
        }

        .dot.warn {
            background: var(--yellow);
        }

        /* ── Layout ── */
        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            flex: 1;
        }

        /* ── Sidebar ── */
        aside {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: sticky;
            top: 56px;
            height: calc(100vh - 56px);
            overflow-y: auto;
        }

        .card {
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 14px;
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: .9px;
            text-transform: uppercase;
            color: var(--t2);
            margin-bottom: 12px;
        }

        .field {
            margin-bottom: 8px;
        }

        .field label {
            font-size: 11px;
            font-weight: 500;
            color: var(--t2);
            display: block;
            margin-bottom: 4px;
        }

        .field input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--rs);
            padding: 7px 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--t1);
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(10, 132, 255, .12);
        }

        .field input[type="password"] {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            letter-spacing: 2px;
        }

        /* ── Proxy field highlight ── */
        .field.proxy-field input {
            border-color: rgba(10, 132, 255, .3);
            background: var(--adim);
        }

        .field.proxy-field input:focus {
            border-color: var(--accent);
            background: var(--surface);
        }

        .field-hint {
            font-size: 10px;
            color: var(--t3);
            margin-top: 3px;
            line-height: 1.4;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 6px 0;
        }

        /* ── Proxy badge ── */
        .proxy-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 20px;
            background: var(--adim);
            color: var(--accent);
            border: 1px solid rgba(10, 132, 255, .2);
            margin-left: 6px;
            vertical-align: middle;
        }

        .btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 8px;
            border-radius: var(--rs);
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            transition: all .15s;
            margin-top: 6px;
        }

        .btn:active {
            transform: scale(.97);
        }

        .btn-p {
            background: var(--accent);
            color: white;
        }

        .btn-p:hover {
            background: var(--adark);
        }

        .btn-g {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--t2);
        }

        .btn-g:hover {
            background: var(--bg);
        }

        /* ── Main ── */
        main {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        /* ── Query Box ── */
        .query-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 16px;
        }

        .query-box-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .query-box-header label {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: .9px;
            text-transform: uppercase;
            color: var(--t2);
        }

        .query-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .query-input {
            flex: 1;
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: var(--rs);
            padding: 9px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--t1);
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

        .query-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(10, 132, 255, .1);
        }

        .query-input::placeholder {
            color: var(--t3);
            font-family: 'DM Sans', sans-serif;
        }

        .run-btn {
            height: 38px;
            padding: 0 18px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--rs);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background .15s, transform .1s;
        }

        .run-btn:hover {
            background: var(--adark);
        }

        .run-btn:active {
            transform: scale(.97);
        }

        .run-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .run-btn svg {
            fill: white;
            width: 13px;
            height: 13px;
        }

        /* Quick queries */
        .quick-label {
            font-size: 11px;
            color: var(--t3);
            margin-top: 10px;
            margin-bottom: 6px;
        }

        .quick-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .quick-item {
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            color: var(--t2);
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .quick-item:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--adim);
        }

        .quick-item .del-btn {
            display: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--border);
            border: none;
            cursor: pointer;
            color: var(--t2);
            font-size: 10px;
            line-height: 14px;
            text-align: center;
            padding: 0;
            flex-shrink: 0;
        }

        .quick-item:hover .del-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quick-item .del-btn:hover {
            background: var(--red);
            color: white;
        }

        /* ── Result Panel ── */
        .result-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            display: none;
        }

        .result-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--s2);
        }

        .result-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 9px;
            border-radius: 20px;
        }

        .tag-ok {
            background: rgba(48, 209, 88, .12);
            color: #1A7A3A;
        }

        .tag-err {
            background: rgba(255, 69, 58, .12);
            color: #C0392B;
        }

        .tag-info {
            background: var(--adim);
            color: var(--accent);
        }

        .result-url {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--t3);
            max-width: 500px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tbl-wrap {
            overflow-x: auto;
            max-height: calc(100vh - 280px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12.5px;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 2;
        }

        th {
            background: var(--accent);
            color: white;
            padding: 8px 14px;
            text-align: left;
            font-family: 'Syne', sans-serif;
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: .3px;
        }

        td {
            padding: 7px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--t1);
            max-width: 240px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:nth-child(even) td {
            background: var(--s2);
        }

        tr:hover td {
            background: var(--adim);
            cursor: default;
        }

        /* raw JSON fallback */
        .raw-out {
            background: #1C1C1E;
            color: #E5E5EA;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.7;
            padding: 16px;
            overflow-x: auto;
            max-height: calc(100vh - 280px);
        }

        /* loading */
        .loading {
            padding: 40px;
            text-align: center;
            color: var(--t3);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
            </div>
            SAP OData Tool
        </div>
        <div class="conn-status">
            <span class="dot" id="connDot"></span>
            <span id="connLbl">Nicht verbunden</span>
        </div>
    </header>

    <div class="layout">
        <aside>
            <div class="card">
                <div class="card-title">SAP Verbindung</div>
                <div class="field">
                    <label>Host</label>
                    <input id="sapHost" type="text" placeholder="http://host:8001" />
                </div>
                <div class="field">
                    <label>Client</label>
                    <input id="sapClient" type="text" placeholder="100" />
                </div>
                <div class="field">
                    <label>Benutzer</label>
                    <input id="sapUser" type="text" placeholder="BPUSER" />
                </div>
                <div class="field">
                    <label>Passwort</label>
                    <input id="sapPassword" type="password" placeholder="••••••••" />
                </div>

                <div class="divider"></div>

                <!-- ── PROXY FIELD (NEU) ── -->
                <div class="field proxy-field">
                    <label>Proxy-URL <span style="font-weight:400;color:var(--t3)">(optional, für CORS)</span></label>
                    <input id="sapProxy" type="text" placeholder="http://localhost:3000" />
                    <div class="field-hint">
                        Wenn gesetzt, werden Requests über diesen Proxy geleitet statt direkt an den SAP-Host.
                        Der Proxy muss <code style="font-family:JetBrains Mono,monospace">/sap/opu/odata/sap/…</code> an den SAP-Host weiterleiten.
                    </div>
                </div>

                <button class="btn btn-p" id="saveBtn">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    Speichern
                </button>
                <button class="btn btn-g" id="testBtn">Verbindung testen</button>
            </div>
        </aside>

        <main>
            <!-- Query Box -->
            <div class="query-box">
                <div class="query-box-header">
                    <label>OData Abfrage</label>
                    <span class="proxy-badge" id="proxyBadge" style="display:none">⇄ Proxy aktiv</span>
                </div>
                <div class="query-row">
                    <input id="queryInput" class="query-input" type="text"
                        placeholder="A_TRSYPOSFLOW_CDS/A_TrsyPosFlow?$top=20" />
                    <button class="run-btn" id="runBtn">
                        <svg viewBox="0 0 24 24">
                            <path d="M5 3l14 9-14 9V3z" />
                        </svg>
                        Ausführen
                    </button>
                </div>
                <div class="quick-label">Schnellzugriff:</div>
                <div class="quick-list" id="quickList"></div>
            </div>

            <!-- Result -->
            <div class="result-panel" id="resultPanel">
                <div class="result-header">
                    <div class="result-meta">
                        <span class="tag tag-ok" id="resultTag">0 Zeilen</span>
                        <span class="result-url" id="resultUrl"></span>
                    </div>
                </div>
                <div id="resultBody"></div>
            </div>
        </main>
    </div>

    <script>
        /* ─── STORAGE ─── */
        const KEY = 'sap_odata_tool_v2';
        function loadStore() { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { return {}; } }
        function saveStore() { try { localStorage.setItem(KEY, JSON.stringify(cfg)); } catch { } }

        const s = loadStore();
        const cfg = {
            host:    s.host    || '',
            client:  s.client  || '',
            user:    s.user    || '',
            pass:    s.pass    || '',
            proxy:   s.proxy   || '',   // ← NEU
            queries: dedup(s.queries || [
                'A_TRSYPOSFLOW_CDS/A_TrsyPosFlow?$top=20',
                'API_FOREIGNEXCHANGEEXPOSURE_SRV/ForeignExchangeExposure?$top=20',
            ])
        };

        /* ─── RESTORE FIELDS ─── */
        document.getElementById('sapHost').value     = cfg.host;
        document.getElementById('sapClient').value   = cfg.client;
        document.getElementById('sapUser').value     = cfg.user;
        document.getElementById('sapPassword').value = cfg.pass;
        document.getElementById('sapProxy').value    = cfg.proxy;
        updateProxyBadge();
        if (cfg.host) setDot('warn', cfg.host);

        function bindField(id, fn) {
            const el = document.getElementById(id);
            el.addEventListener('input', () => { fn(el.value); saveStore(); });
        }
        bindField('sapHost',     v => { cfg.host   = v.trim().replace(/\/$/, ''); });
        bindField('sapClient',   v => { cfg.client = v.trim(); });
        bindField('sapUser',     v => { cfg.user   = v.trim(); });
        bindField('sapPassword', v => { cfg.pass   = v; });
        bindField('sapProxy',    v => { cfg.proxy  = v.trim().replace(/\/$/, ''); updateProxyBadge(); });

        function updateProxyBadge() {
            document.getElementById('proxyBadge').style.display = cfg.proxy ? 'inline-flex' : 'none';
        }

        /* ─── SAVE BUTTON ─── */
        document.getElementById('saveBtn').addEventListener('click', () => {
            saveStore();
            setDot('warn', cfg.host || '—');
        });

        /* ─── TEST CONNECTION ─── */
        document.getElementById('testBtn').addEventListener('click', async () => {
            if (!cfg.host && !cfg.proxy) { alert('Bitte zuerst Host eintragen.'); return; }
            setDot('warn', 'Teste…');
            try {
                const base = cfg.proxy || cfg.host;   // Proxy bevorzugen
                const url = base + '/sap/opu/odata/sap/?sap-client=' + encodeURIComponent(cfg.client)
                    + '&$format=json&sap-user=' + encodeURIComponent(cfg.user)
                    + '&sap-password=' + encodeURIComponent(cfg.pass);
                const res = await fetch(url);
                if (res.ok || res.status === 401) {
                    setDot('ok', (cfg.proxy ? 'Proxy · ' : '') + 'HTTP ' + res.status);
                } else {
                    setDot('warn', 'HTTP ' + res.status);
                }
            } catch (e) {
                setDot('', 'Fehler: ' + e.message);
            }
        });

        /* ─── QUICK LIST ─── */
        function renderQuickList() {
            const el = document.getElementById('quickList');
            el.innerHTML = cfg.queries.map((q, i) =>
                `<span class="quick-item" onclick="useQuery(${i})">
                    ${esc(q)}
                    <button class="del-btn" title="Entfernen" onclick="removeQuery(event,${i})">✕</button>
                </span>`
            ).join('');
        }
        renderQuickList();

        function useQuery(i) {
            document.getElementById('queryInput').value = cfg.queries[i];
            runQuery();
        }

        /* ── FIX: Quick-List Eintrag löschen ── */
        function removeQuery(e, i) {
            e.stopPropagation();
            cfg.queries.splice(i, 1);
            saveStore();
            renderQuickList();
        }

        /* ─── RUN ─── */
        document.getElementById('runBtn').addEventListener('click', runQuery);
        document.getElementById('queryInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') runQuery();
        });

        async function runQuery() {
            const raw = document.getElementById('queryInput').value.trim();
            if (!raw) return;
            if (!cfg.host && !cfg.proxy) { alert('Bitte SAP Host (oder Proxy) eintragen und speichern.'); return; }

            /* ── FIX: Dedup — vorher rausfiltern, dann vorne einfügen ── */
            cfg.queries = cfg.queries.filter(q => q !== raw);
            cfg.queries.unshift(raw);
            if (cfg.queries.length > 8) cfg.queries.pop();
            saveStore();
            renderQuickList();

            /* Build URL — Proxy hat Vorrang vor Host */
            const base = cfg.proxy || cfg.host;
            const sep  = raw.includes('?') ? '&' : '?';
            let extra  = '$format=json';
            if (cfg.client) extra += '&sap-client='   + encodeURIComponent(cfg.client);
            if (cfg.user)   extra += '&sap-user='     + encodeURIComponent(cfg.user);
            if (cfg.pass)   extra += '&sap-password=' + encodeURIComponent(cfg.pass);
            const url = base + '/sap/opu/odata/sap/' + raw + sep + extra;

            showLoading(url);

            try {
                const res  = await fetch(url, { headers: authHeader() });
                const text = await res.text();

                if (!res.ok) {
                    showError('HTTP ' + res.status, text.slice(0, 400), url);
                    return;
                }

                let json;
                try { json = JSON.parse(text); }
                catch { showRaw(text, url); return; }

                showTable(json, url);

            } catch (e) {
                showError('Netzwerkfehler', e.message, url);
            }
        }

        /* ─── AUTH ─── */
        function authHeader() {
            return { 'Accept': 'application/json' };
        }

        /* ─── DISPLAY ─── */
        function showLoading(url) {
            const panel = document.getElementById('resultPanel');
            panel.style.display = 'block';
            document.getElementById('resultUrl').textContent  = url;
            document.getElementById('resultTag').className    = 'tag tag-info';
            document.getElementById('resultTag').textContent  = 'Lädt…';
            document.getElementById('resultBody').innerHTML   =
                '<div class="loading"><div class="spinner"></div> Anfrage läuft…</div>';
        }

        function showTable(json, url) {
            let rows = null;
            if (Array.isArray(json?.d?.results))            rows = json.d.results;
            else if (Array.isArray(json?.value))            rows = json.value;
            else if (json?.d && typeof json.d === 'object') rows = [json.d];

            if (rows && rows.length > 0) {
                const cols  = Object.keys(rows[0]).filter(k => k !== '__metadata');
                const thead = '<tr>' + cols.map(c => '<th>' + esc(c) + '</th>').join('') + '</tr>';
                const tbody = rows.map(r =>
                    '<tr>' + cols.map(c => '<td title="' + esc(str(r[c])) + '">' + esc(str(r[c])) + '</td>').join('') + '</tr>'
                ).join('');

                document.getElementById('resultTag').className   = 'tag tag-ok';
                document.getElementById('resultTag').textContent = rows.length + ' Datensatz' + (rows.length !== 1 ? 'e' : '');
                document.getElementById('resultUrl').textContent = url;
                document.getElementById('resultBody').innerHTML  =
                    '<div class="tbl-wrap"><table><thead>' + thead + '</thead><tbody>' + tbody + '</tbody></table></div>';
            } else {
                showRaw(JSON.stringify(json, null, 2), url);
            }
        }

        function showRaw(text, url) {
            document.getElementById('resultTag').className   = 'tag tag-info';
            document.getElementById('resultTag').textContent = 'Raw Response';
            document.getElementById('resultUrl').textContent = url;
            document.getElementById('resultBody').innerHTML  =
                '<pre class="raw-out">' + esc(text) + '</pre>';
            document.getElementById('resultPanel').style.display = 'block';
        }

        function showError(label, detail, url) {
            document.getElementById('resultTag').className   = 'tag tag-err';
            document.getElementById('resultTag').textContent = label;
            document.getElementById('resultUrl').textContent = url;
            document.getElementById('resultBody').innerHTML  =
                '<pre class="raw-out" style="color:#FF6B6B">' + esc(detail) + '</pre>';
            document.getElementById('resultPanel').style.display = 'block';
        }

        /* ─── HELPERS ─── */
        function setDot(state, label) {
            document.getElementById('connDot').className  = 'dot' + (state ? ' ' + state : '');
            document.getElementById('connLbl').textContent = label;
        }

        /* ── FIX: Deduplizierung beim Laden ── */
        function dedup(arr) {
            const seen = new Set();
            return arr.filter(q => {
                const k = q.trim();
                if (seen.has(k)) return false;
                seen.add(k);
                return true;
            });
        }

        function str(v) { return v == null ? '' : String(v); }

        function esc(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    </script>
</body>

</html>
